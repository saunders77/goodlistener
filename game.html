<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoodListener</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font: 15px/1.4 sans-serif;
    }

    .page {
      width: min(1320px, calc(100% - 1rem));
      margin: 0 auto;
      padding: 0.5rem 0;
    }

    .top-bar {
      margin-bottom: 0.75rem;
    }

    .top-bar h1 {
      margin: 0 0 0.35rem;
      font-size: 1.6rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem 1rem;
      margin: 0 0 0.5rem;
    }

    .controls span {
      white-space: nowrap;
    }

    kbd {
      border: 1px solid #aaa;
      border-radius: 3px;
      padding: 0.05rem 0.28rem;
      background: #f5f5f5;
      font: 0.95em ui-monospace, SFMono-Regular, Consolas, monospace;
    }

    .game-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    .game-overlay[hidden] {
      display: none;
    }

    #caught-overlay {
      background: rgba(255, 0, 0, 0.28);
    }

    .game-dialog {
      text-align: center;
    }

    .game-dialog h2 {
      margin: 0 0 1rem;
      font: inherit;
    }

    .caught-dialog h2 {
      color: white;
      font-size: clamp(2rem, 7vw, 4rem);
      font-weight: 700;
      text-shadow: 0 2px 8px black;
    }

    .game-dialog button {
      cursor: pointer;
      font: inherit;
    }

    .game-dialog button:disabled {
      cursor: wait;
      opacity: 0.62;
    }

    #start-button {
      padding: 0.7rem 1.4rem;
      font-size: 1.5rem;
    }

    .world-view {
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      background: #05080f;
    }

    p {
      margin: 0 0 0.5rem;
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="top-bar">
      <h1>Catch the mosquito</h1>
      <p>Use the keyboard to move, then listen for the mosquito. Its pitch changes with the doppler effect from relative motion. For a challenge, play with your eyes closed.</p>
      <div class="controls" aria-label="Keyboard controls">
        <span><kbd>W</kbd> / <kbd>Up</kbd>: forward</span>
        <span><kbd>S</kbd> / <kbd>Down</kbd>: backward</span>
        <span><kbd>A</kbd> / <kbd>Left</kbd> and <kbd>D</kbd> / <kbd>Right</kbd>: turn</span>
      </div>
      <!--<p id="audio-status">Click start to begin the chase.</p>-->
    </header>

    <div class="world-view">
      <canvas
        id="first-person-view"
        width="1280"
        height="720"
      ></canvas>

      <div
        id="start-overlay"
        class="game-overlay"
        role="dialog"
        aria-modal="true"
        aria-label="Start game"
      >
        <div class="game-dialog">
          <button id="start-button" type="button" disabled>start</button>
        </div>
      </div>

      <div
        id="caught-overlay"
        class="game-overlay"
        role="dialog"
        aria-modal="true"
        aria-labelledby="caught-title"
        hidden
      >
        <div class="game-dialog caught-dialog">
          <h2 id="caught-title">caught the mosquito!</h2>
          <button id="try-again" type="button">try again</button>
        </div>
      </div>
    </div>
  </main>

  <script src="game/mosquito-code.js"></script>
  <script src="game/game-audio.js"></script>
  <script src="game/game.js"></script>
</body>
</html>
